name: TP5 CI/CD

on:
  push:
    branches:
      - main
      - tp5-dev
  pull_request:
    branches:
      - main

jobs:
  build-test-sonar-docker:
    name: Build, Test, SonarCloud, Docker
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Donner les droits a mvnw
        run: chmod +x mvnw

      - name: Build + Tests
        run: ./mvnw clean verify

      - name: Analyse SonarCloud
        run: ./mvnw sonar:sonar -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} -Dsonar.host.url=https://sonarcloud.io -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Construire image Docker
        run: docker build -t tp5-auth-app .