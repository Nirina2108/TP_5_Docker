name: TP5 CI/CD

on:
  push:
    branches:
      - main
      - tp5-dev
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du projet
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Donner les droits a mvnw
        run: chmod +x mvnw

      - name: Build et tests Maven
        run: ./mvnw clean verify

      - name: Analyse SonarCloud
        run: ./mvnw sonar:sonar -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} -Dsonar.host.url=https://sonarcloud.io -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Build image Docker
        run: docker build -t nirina2108/tp_5_docker:latest .

      # ✅ Étapes ajoutées pour Docker Hub
      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image vers Docker Hub
        run: docker push nirina2108/tp_5_docker:latest
          # ✅ Après — tout en une seule commande
               - name: Build, tests et SonarCloud
               env:
                 SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
               run: ./mvnw clean verify sonar:sonar
                 -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
                 -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
                 -Dsonar.host.url=https://sonarcloud.io
                 -Dsonar.token=${{ secrets.SONAR_TOKEN }}